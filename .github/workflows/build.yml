name: Build & Release PHYNIX OS

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write     # needed for creating GitHub Releases
  packages: write

jobs:
  # -----------------------------------------------------------------------
  # 1. Validate flake
  # -----------------------------------------------------------------------
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: phynix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true   # graceful if token not set yet

      - name: Check flake
        run: nix flake check ./phynix-os --no-build
        working-directory: ${{ github.workspace }}

  # -----------------------------------------------------------------------
  # 2. Build Copilot package
  # -----------------------------------------------------------------------
  build-copilot:
    name: Build phynix-copilot
    runs-on: ubuntu-latest
    needs: flake-check
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: phynix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build phynix-copilot
        run: nix build ./phynix-os#phynix-copilot --print-build-logs
        working-directory: ${{ github.workspace }}

      - name: Push to Cachix
        if: github.ref == 'refs/heads/main' && env.CACHIX_AUTH_TOKEN != ''
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix build ./phynix-os#phynix-copilot --print-out-paths | \
            cachix push phynix

  # -----------------------------------------------------------------------
  # 3. Build Installer ISO (only on tags / main)
  # -----------------------------------------------------------------------
  build-iso:
    name: Build Installer ISO
    runs-on: ubuntu-latest
    needs: flake-check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            # Allow large builds
            max-jobs = auto
            cores = 0

      - uses: cachix/cachix-action@v15
        with:
          name: phynix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Install nixos-generators
        run: nix profile install nixpkgs#nixos-generators

      - name: Build ISO
        run: |
          nixos-generate \
            --format iso \
            --flake ./phynix-os#installer-iso \
            --out-link result-iso
        working-directory: ${{ github.workspace }}

      - name: Rename ISO
        run: |
          VERSION="${{ github.ref_name }}"
          ISO_SRC=$(readlink -f result-iso/iso/*.iso)
          ISO_NAME="phynix-os-${VERSION}-x86_64.iso"
          cp "$ISO_SRC" "$ISO_NAME"
          echo "ISO_PATH=$ISO_NAME" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV
          sha256sum "$ISO_NAME" > "${ISO_NAME}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: phynix-os-iso
          path: |
            ${{ env.ISO_PATH }}
            ${{ env.ISO_PATH }}.sha256
          retention-days: 7

  # -----------------------------------------------------------------------
  # 4. GitHub Release (tag pushes only)
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-copilot, build-iso]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: phynix-os-iso
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PHYNIX OS ${{ github.ref_name }}"
          body: |
            ## 🔥 PHYNIX OS ${{ github.ref_name }}

            NixOS-based distribution with integrated AI Copilot.

            ### 📥 Installation

            1. Download the ISO below
            2. Verify checksum: `sha256sum -c phynix-os-*.iso.sha256`
            3. Write to USB: `dd if=phynix-os-*.iso of=/dev/sdX bs=4M status=progress`
            4. Boot and follow the TUI installer

            ### 🤖 Copilot

            After installation:
            ```bash
            pcopilot --backend          # Check LLM backend
            pcopilot --reindex          # Build RAG index
            pcopilot "how do I..."      # Ask anything NixOS-related
            ```

            ### 📦 Binary Cache

            ```nix
            nix.settings.substituters = [ "https://phynix.cachix.org" ];
            ```

            ### 🔗 Links

            - Documentation: [PHYNIX OS Docs](https://github.com/${{ github.repository }})
            - Binary Cache: [phynix.cachix.org](https://phynix.cachix.org)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            ./release/*.iso
            ./release/*.sha256

  # -----------------------------------------------------------------------
  # 5. Python tests (copilot agent)
  # -----------------------------------------------------------------------
  python-tests:
    name: Python Agent Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r phynix-os/pkgs/phynix-copilot/requirements.txt \
            --quiet --no-deps 2>/dev/null || true
          pip install pydantic requests rich

      - name: Syntax check
        run: |
          for f in phynix-os/pkgs/phynix-copilot/*.py; do
            python3 -m py_compile "$f" && echo "✓ $f"
          done

      - name: Module import tests
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0, 'phynix-os/pkgs/phynix-copilot')

          for mod in ['tools', 'rag', 'evolution', 'completions', 'write_tools', 'write_agent']:
              try:
                  __import__(mod)
                  print(f"✓ {mod}")
              except ImportError as e:
                  print(f"⚠ {mod} (missing optional dep): {e}")
              except Exception as e:
                  print(f"✗ {mod}: {e}")
                  sys.exit(1)
          EOF

      - name: RAG index test
        run: |
          python3 << 'EOF'
          import sys, tempfile
          sys.path.insert(0, 'phynix-os/pkgs/phynix-copilot')
          from rag import RAGIndex

          with tempfile.TemporaryDirectory() as tmp:
              rag = RAGIndex(tmp)
              result = rag.index_all()
              assert result['total_chunks'] > 0, "No chunks indexed"
              assert result['nixos_options']['count'] > 0

              results = rag.search("pipewire audio", top_k=2)
              assert results, "Search returned nothing"
              print(f"✓ RAG: {result['total_chunks']} chunks indexed")
              print(f"✓ Search: '{results[0]['title']}' score={results[0]['relevance']}")
          EOF

      - name: Agent routing test
        run: |
          python3 << 'EOF'
          import sys, tempfile
          sys.path.insert(0, 'phynix-os/pkgs/phynix-copilot')

          import rag as rag_mod
          orig = rag_mod.RAGIndex.__init__
          import tempfile; tmp = tempfile.mkdtemp()
          rag_mod.RAGIndex.__init__ = lambda self, db=None: orig(self, tmp)

          from agent import PhynixCopilot
          c = PhynixCopilot(interactive=True)

          cases = [
              ("search ripgrep",   "nix_search"),
              ("check flake",      "nix_flake_check"),
              ("install vim hm",   "write_agent"),
          ]
          for query, expected in cases:
              got = c._route_query(query)["tool"]
              assert got == expected, f"'{query}': expected {expected}, got {got}"
              print(f"✓ '{query}' → {got}")
          EOF
