name: Release PHYNIX OS

# Flake checks (incl. live NixOS VM tests), package builds and the
# binary cache are handled by Hercules CI — see hercules-ci.nix.
# This workflow only handles release packaging for tag pushes.

on:
  push:
    branches: [main]
    tags:     ['v*']

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Build Installer ISO for release (tags + main)
  # -----------------------------------------------------------------------
  build-iso:
    name: Build Installer ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto
            cores = 0
            substituters = https://cache.nixos.org https://cache.phynix-os.example/phynix
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= phynix:PLACEHOLDER_ATTIC_PUBLIC_KEY=

      - name: Install nixos-generators
        run: nix profile install nixpkgs#nixos-generators

      - name: Build ISO
        run: |
          nixos-generate \
            --format iso \
            --flake ./phynix-os#installer-iso \
            --out-link result-iso
        working-directory: ${{ github.workspace }}

      - name: Rename ISO
        run: |
          VERSION="${{ github.ref_name }}"
          ISO_SRC=$(readlink -f result-iso/iso/*.iso)
          ISO_NAME="phynix-os-${VERSION}-x86_64.iso"
          cp "$ISO_SRC" "$ISO_NAME"
          echo "ISO_PATH=$ISO_NAME" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV
          sha256sum "$ISO_NAME" > "${ISO_NAME}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: phynix-os-iso
          path: |
            ${{ env.ISO_PATH }}
            ${{ env.ISO_PATH }}.sha256
          retention-days: 7

      - name: Push ISO to Attic cache
        if: env.ATTIC_TOKEN != ''
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix profile install nixpkgs#attic-client
          attic login phynix https://cache.phynix-os.example "$ATTIC_TOKEN"
          attic push phynix "$(readlink -f result-iso)"

  # -----------------------------------------------------------------------
  # GitHub Release (tag pushes only)
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-iso]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: phynix-os-iso
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PHYNIX OS ${{ github.ref_name }}"
          body: |
            ## PHYNIX OS ${{ github.ref_name }}

            NixOS-based distribution with integrated AI Copilot.

            ### Installation

            1. Download the ISO below
            2. Verify checksum: `sha256sum -c phynix-os-*.iso.sha256`
            3. Write to USB: `dd if=phynix-os-*.iso of=/dev/sdX bs=4M status=progress`
            4. Boot and follow the TUI installer

            ### Binary cache

            ```nix
            nix.settings = {
              substituters = [ "https://cache.phynix-os.example/phynix" ];
              trusted-public-keys = [ "phynix:PLACEHOLDER_ATTIC_PUBLIC_KEY=" ];
            };
            ```

            ### Links

            - Documentation: [PHYNIX OS Docs](https://github.com/${{ github.repository }})
            - CI: [Hercules CI](https://hercules-ci.com)
            - Mirror: [Codeberg](https://codeberg.org/phynix-os/phynix-os)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            ./release/*.iso
            ./release/*.sha256
