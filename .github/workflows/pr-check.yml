name: PR Checks

# Nix flake validation and package builds are handled by Garnix
# (see garnix.yaml). This workflow only covers fast Python feedback.

on:
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Python Syntax & Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: |
          for f in phynix-os/pkgs/phynix-copilot/*.py; do
            python3 -m py_compile "$f" && echo "ok $f"
          done
      - name: RAG + routing smoke test
        run: |
          pip install pydantic requests --quiet
          python3 << 'EOF'
          import sys, tempfile
          sys.path.insert(0, 'phynix-os/pkgs/phynix-copilot')
          from rag import RAGIndex

          with tempfile.TemporaryDirectory() as tmp:
              rag = RAGIndex(tmp)
              r = rag.index_all()
              assert r['total_chunks'] > 0
              hits = rag.search("hyprland keybind")
              assert hits
              print(f"RAG smoke test: {r['total_chunks']} docs, search OK")
          EOF
