name: Mirror to Codeberg

# Mirrors the repository to Codeberg (Forgejo) so the project has a
# fully FOSS-hosted home alongside GitHub. Requires repo secret
# CODEBERG_SSH_KEY (private key) and a corresponding deploy key with
# write access on the Codeberg repo.

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    name: Push mirror to Codeberg
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'ichnixkann/phynixOS' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Codeberg
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@codeberg.org:phynix-os/phynix-os.git
          ssh_private_key: ${{ secrets.CODEBERG_SSH_KEY }}
