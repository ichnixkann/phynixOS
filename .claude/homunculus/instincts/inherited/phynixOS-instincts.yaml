# PhynixOS Workflow Ci Pipeline Migration Or Refactor

## Action

Follow the ci-pipeline-migration-or-refactor workflow:
1. Add or remove .github/workflows/*.yml files to reflect new CI jobs.
2. Add or remove infrastructure config files (e.g., garnix.yaml, hercules-ci.nix).
3. Update flake.nix and related Nix files to wire in new checks/builds.
4. Update README.md and phynix-os/README.md to document new CI pipeline.
5. Remove obsolete infra/docs files (e.g., docs/infra/attic-deploy.md).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .github/workflows/*.yml, README.md, phynix-os/README.md

